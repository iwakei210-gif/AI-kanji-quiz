<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#4a90e2">
    <title>漢字クイズ</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app">
        <header class="header">
            <h1>漢字クイズ</h1>
            <p class="subtitle">小学4年生レベル</p>
        </header>

        <main class="main">
            <section id="quiz-screen" class="screen">
                <div class="progress">
                    <span id="question-number">問題 1 / 10</span>
                    <span id="score-display">正解: 0</span>
                </div>

                <div class="kanji-box">
                    <p class="question-label">次の漢字の読み方は？</p>
                    <div id="kanji" class="kanji"></div>
                </div>

                <div id="choices" class="choices"></div>

                <div id="feedback" class="feedback hidden">
                    <p id="result-text" class="result-text"></p>
                    <p id="correct-answer" class="correct-answer"></p>
                    <button id="next-btn" class="btn btn-primary">次の問題</button>
                </div>
            </section>

            <section id="result-screen" class="screen hidden">
                <h2 class="result-title">クイズ終了！</h2>
                <div class="result-summary">
                    <p class="score-label">あなたのスコア</p>
                    <p id="final-score" class="final-score">0 / 10</p>
                    <p id="result-message" class="result-message"></p>
                </div>
                <button id="restart-btn" class="btn btn-primary">もう一度挑戦</button>
            </section>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
